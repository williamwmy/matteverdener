<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#262146"/>
      <stop offset="100%" stop-color="#0f0e17"/>
    </radialGradient>
    <linearGradient id="planet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5be08a"/>
      <stop offset="55%" stop-color="#4ecb71"/>
      <stop offset="100%" stop-color="#2f9f86"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- stjerner -->
  <circle cx="78" cy="96" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="438" cy="78" r="5" fill="#ffffff" opacity="0.6"/>
  <circle cx="120" cy="438" r="3.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="452" cy="430" r="3" fill="#ffffff" opacity="0.5"/>

  <!-- ring bak planeten -->
  <g transform="rotate(-20 256 264)">
    <ellipse cx="256" cy="264" rx="206" ry="64" fill="none" stroke="#f9c846" stroke-width="16"/>
  </g>

  <!-- planet -->
  <circle cx="256" cy="264" r="122" fill="url(#planet)"/>
  <ellipse cx="212" cy="220" rx="48" ry="32" fill="#ffffff" opacity="0.18"/>

  <!-- ring foran (nedre halvdel krysser planeten) -->
  <g transform="rotate(-20 256 264)">
    <path d="M 50 264 A 206 64 0 0 0 462 264" fill="none" stroke="#f9c846" stroke-width="16"/>
  </g>

  <!-- stort pluss på planeten (lesbart selv i lite format) -->
  <g fill="#ffffff">
    <rect x="240" y="206" width="32" height="116" rx="9"/>
    <rect x="198" y="248" width="116" height="32" rx="9"/>
  </g>

  <!-- regne-måner (×, −, ÷) -->
  <g>
    <circle cx="412" cy="150" r="34" fill="#7ed4f7"/>
    <g transform="translate(412 150) rotate(45)" fill="#0f2733">
      <rect x="-5" y="-19" width="10" height="38" rx="5"/>
      <rect x="-19" y="-5" width="38" height="10" rx="5"/>
    </g>
  </g>
  <g>
    <circle cx="92" cy="246" r="28" fill="#f29bc6"/>
    <rect x="76" y="241" width="32" height="10" rx="5" fill="#3a1430"/>
  </g>
  <g>
    <circle cx="150" cy="408" r="30" fill="#b07ef7"/>
    <rect x="134" y="403" width="32" height="10" rx="5" fill="#241040"/>
    <circle cx="150" cy="392" r="5" fill="#241040"/>
    <circle cx="150" cy="424" r="5" fill="#241040"/>
  </g>
</svg>
